# Build en Google Cloud Build (sin Docker local). Lo invoca deploy.sh si el daemon no está en marcha.
substitutions:
  _IMAGE: placeholder-will-be-overridden
  _VITE_FIREBASE_API_KEY: ""
  _VITE_FIREBASE_AUTH_DOMAIN: ""
  _VITE_FIREBASE_PROJECT_ID: ""
  _VITE_FIREBASE_STORAGE_BUCKET: ""
  _VITE_FIREBASE_MESSAGING_SENDER_ID: ""
  _VITE_FIREBASE_APP_ID: ""
  _VITE_TOKEN_ALTAS_BAJAS: ""
  _VITE_FIREBASE_PANEL_EMAIL: ""
  _VITE_FIREBASE_PANEL_PASSWORD: ""

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--platform"
      - "linux/amd64"
      - "-t"
      - "${_IMAGE}"
      - "--build-arg"
      - "VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}"
      - "--build-arg"
      - "VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}"
      - "--build-arg"
      - "VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}"
      - "--build-arg"
      - "VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}"
      - "--build-arg"
      - "VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}"
      - "--build-arg"
      - "VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}"
      - "--build-arg"
      - "VITE_TOKEN_ALTAS_BAJAS=${_VITE_TOKEN_ALTAS_BAJAS}"
      - "--build-arg"
      - "VITE_FIREBASE_PANEL_EMAIL=${_VITE_FIREBASE_PANEL_EMAIL}"
      - "--build-arg"
      - "VITE_FIREBASE_PANEL_PASSWORD=${_VITE_FIREBASE_PANEL_PASSWORD}"
      - "."

images:
  - "${_IMAGE}"

options:
  logging: CLOUD_LOGGING_ONLY
